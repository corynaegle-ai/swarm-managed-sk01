<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Collection Phase</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-purple-900 min-h-screen">
    <div x-data="bidCollectionComponent()" class="container mx-auto py-8 px-4">
        <!-- Header Section -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">Bid Collection Phase</h1>
            <div class="flex justify-center gap-8 text-white text-lg">
                <div class="bg-blue-800 rounded-lg px-6 py-3">
                    <p class="text-blue-200 text-sm">Current Round</p>
                    <p class="text-3xl font-bold" x-text="currentRound"></p>
                </div>
                <div class="bg-purple-800 rounded-lg px-6 py-3">
                    <p class="text-purple-200 text-sm">Cards in Hand</p>
                    <p class="text-3xl font-bold" x-text="handCount"></p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-2xl mx-auto">
            <!-- Player Progress Bar -->
            <div class="mb-8 bg-white/10 rounded-lg p-6 backdrop-blur-sm">
                <p class="text-white text-sm font-semibold mb-4">Player Progress</p>
                <div class="flex items-center justify-between mb-2">
                    <span class="text-white text-sm" x-text="`Player ${currentPlayerIndex + 1} of ${players.length}`"></span>
                    <span class="text-white text-sm" x-text="`${bidsEntered}/${players.length} bids collected`"></span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2">
                    <div class="bg-green-500 h-2 rounded-full transition-all duration-300" 
                         :style="`width: ${(bidsEntered / players.length) * 100}%`"></div>
                </div>
            </div>

            <!-- Current Player Bid Input -->
            <div class="bg-white/10 rounded-lg p-8 backdrop-blur-sm border border-white/20">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-white mb-4">
                        <span x-text="players[currentPlayerIndex]?.name || 'Player'"></span>
                    </h2>
                    <p class="text-gray-300 text-sm">How many tricks will you win?</p>
                </div>

                <!-- Bid Input Field -->
                <div class="mb-6">
                    <label class="block text-white text-sm font-semibold mb-3">Enter your bid:</label>
                    <div class="relative">
                        <input 
                            type="number" 
                            x-model.number="currentBidInput"
                            @input="validateBidInput"
                            :disabled="!isCurrentPlayerActive"
                            :class="[
                                'w-full px-4 py-3 text-center text-2xl font-bold rounded-lg border-2 transition-all duration-200',
                                isCurrentPlayerActive ? 'border-blue-500 bg-blue-50 text-blue-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-300' : 'border-gray-500 bg-gray-100 text-gray-500 cursor-not-allowed',
                                bidError ? 'border-red-500 focus:ring-2 focus:ring-red-300' : ''
                            ]"
                            min="0" 
                            :max="currentRound"
                            placeholder="0"
                        >
                    </div>
                    <div x-show="bidError" class="text-red-400 text-sm mt-2" x-text="bidError"></div>
                </div>

                <!-- Bid Range Help Text -->
                <div class="bg-blue-900/30 border border-blue-500/30 rounded-lg p-4 mb-6">
                    <p class="text-blue-200 text-sm">
                        <span class="font-semibold">Valid bid range:</span> 0 to <span x-text="currentRound" class="font-bold"></span> tricks
                    </p>
                </div>

                <!-- Current Bid Status -->
                <div class="bg-gray-800 rounded-lg p-4 mb-6">
                    <p class="text-gray-300 text-sm font-semibold mb-2">Current bid:</p>
                    <p class="text-3xl font-bold text-white" x-text="currentBidInput !== null && currentBidInput !== '' ? currentBidInput : '-'"></p>
                </div>
            </div>

            <!-- Collected Bids Summary -->
            <div x-show="bidsEntered > 0" class="bg-white/10 rounded-lg p-6 backdrop-blur-sm mt-6 border border-white/20">
                <h3 class="text-white font-semibold mb-4">Bids Collected:</h3>
                <div class="grid grid-cols-2 gap-3">
                    <template x-for="(player, index) in players" :key="index">
                        <div :class="[
                            'p-3 rounded-lg text-sm font-semibold',
                            player.bid !== null ? 'bg-green-600/30 text-green-200 border border-green-500/50' : 'bg-gray-700/50 text-gray-400 border border-gray-600/50'
                        ]">
                            <p x-text="player.name"></p>
                            <p class="text-lg" x-text="player.bid !== null ? `Bid: ${player.bid}` : 'Pending'"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex gap-4 mt-8">
                <button 
                    @click="previousPlayer"
                    :disabled="currentPlayerIndex === 0"
                    :class="[
                        'flex-1 py-3 px-4 rounded-lg font-semibold transition-all duration-200',
                        currentPlayerIndex === 0 
                            ? 'bg-gray-600 text-gray-400 cursor-not-allowed' 
                            : 'bg-gray-600 text-white hover:bg-gray-700'
                    ]"
                >
                    ← Previous
                </button>
                
                <button 
                    @click="nextPlayer"
                    :disabled="!canProceedToNextPlayer"
                    :class="[
                        'flex-1 py-3 px-4 rounded-lg font-semibold transition-all duration-200',
                        canProceedToNextPlayer 
                            ? 'bg-blue-600 text-white hover:bg-blue-700' 
                            : 'bg-gray-600 text-gray-400 cursor-not-allowed'
                    ]"
                >
                    <span x-show="currentPlayerIndex < players.length - 1">Next →</span>
                    <span x-show="currentPlayerIndex === players.length - 1">Review</span>
                </button>
            </div>

            <!-- Proceed to Next Phase Button -->
            <button 
                @click="proceedToNextPhase"
                :disabled="!allBidsEntered"
                :class="[
                    'w-full mt-6 py-4 px-6 rounded-lg font-bold text-lg transition-all duration-200',
                    allBidsEntered 
                        ? 'bg-gradient-to-r from-green-500 to-emerald-600 text-white hover:from-green-600 hover:to-emerald-700 shadow-lg' 
                        : 'bg-gray-600 text-gray-400 cursor-not-allowed'
                ]"
            >
                <span x-show="!allBidsEntered" x-text="`Complete all ${players.length} bids to proceed`"></span>
                <span x-show="allBidsEntered">Start Playing Round</span>
            </button>
        </div>
    </div>

    <script>
        function bidCollectionComponent() {
            return {
                // State
                currentRound: 1,
                handCount: 10,
                players: [
                    { name: 'Player 1', bid: null },
                    { name: 'Player 2', bid: null },
                    { name: 'Player 3', bid: null },
                    { name: 'Player 4', bid: null }
                ],
                currentPlayerIndex: 0,
                currentBidInput: '',
                bidError: '',

                // Computed Properties
                get isCurrentPlayerActive() {
                    return true; // Current player is always active
                },

                get bidsEntered() {
                    return this.players.filter(p => p.bid !== null).length;
                },

                get allBidsEntered() {
                    return this.players.every(p => p.bid !== null);
                },

                get canProceedToNextPlayer() {
                    return this.currentBidInput !== '' && this.currentBidInput !== null && !this.bidError;
                },

                // Methods
                validateBidInput() {
                    this.bidError = '';
                    
                    if (this.currentBidInput === '' || this.currentBidInput === null) {
                        return;
                    }

                    const bid = this.currentBidInput;

                    if (isNaN(bid)) {
                        this.bidError = 'Please enter a valid number';
                        return;
                    }

                    if (bid < 0) {
                        this.bidError = 'Bid cannot be negative';
                        return;
                    }

                    if (bid > this.currentRound) {
                        this.bidError = `Bid cannot exceed ${this.currentRound}`;
                        return;
                    }

                    if (!Number.isInteger(bid)) {
                        this.bidError = 'Bid must be a whole number';
                        return;
                    }
                },

                nextPlayer() {
                    if (!this.canProceedToNextPlayer) {
                        return;
                    }

                    // Save current bid
                    this.players[this.currentPlayerIndex].bid = this.currentBidInput;

                    // Move to next player if not at the end
                    if (this.currentPlayerIndex < this.players.length - 1) {
                        this.currentPlayerIndex++;
                        this.resetBidInput();
                    }
                },

                previousPlayer() {
                    if (this.currentPlayerIndex > 0) {
                        // Save current bid before moving
                        this.players[this.currentPlayerIndex].bid = this.currentBidInput;
                        
                        this.currentPlayerIndex--;
                        this.currentBidInput = this.players[this.currentPlayerIndex].bid ?? '';
                        this.bidError = '';
                    }
                },

                resetBidInput() {
                    this.currentBidInput = this.players[this.currentPlayerIndex].bid ?? '';
                    this.bidError = '';
                },

                proceedToNextPhase() {
                    if (!this.allBidsEntered) {
                        return;
                    }

                    // Dispatch event or call parent callback
                    const bidsData = this.players.map(p => ({
                        name: p.name,
                        bid: p.bid
                    }));

                    console.log('All bids collected:', bidsData);
                    
                    // Emit custom event that can be listened to by parent
                    const event = new CustomEvent('bidsCollected', {
                        detail: { bids: bidsData }
                    });
                    document.dispatchEvent(event);
                },

                // Initialize component
                init() {
                    // Reset bid input for first player
                    this.resetBidInput();
                }
            }
        }
    </script>
</body>
</html>

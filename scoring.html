<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Scoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }
        .score-card {
            transition: all 0.3s ease;
            border-left: 4px solid #3b82f6;
        }
        .score-card:hover {
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }
        .input-field {
            transition: border-color 0.2s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .error-input {
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.05);
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .badge-success {
            background-color: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }
        .badge-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
        .badge-warning {
            background-color: rgba(234, 179, 8, 0.1);
            color: #b45309;
        }
        .gradient-heading {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-breakdown {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, rgba(139, 92, 246, 0.05) 100%);
            border-radius: 8px;
            padding: 1rem;
        }
        .table-row-hover:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen" x-cloak>
    <div id="scoring-app" x-data="scoringApp()" class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="max-w-7xl mx-auto">
            <div class="mb-8">
                <h1 class="text-4xl font-bold gradient-heading mb-2">Game Scoring</h1>
                <p class="text-gray-600">Calculate and track scores for each round</p>
            </div>

            <!-- Alerts -->
            <template x-if="alert.show">
                <div :class="['mb-6 p-4 rounded-lg', alert.type === 'success' ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200']">
                    <p :class="alert.type === 'success' ? 'text-green-700' : 'text-red-700'" x-text="alert.message"></p>
                </div>
            </template>

            <!-- Main Content Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Input Section -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                            <span class="text-2xl mr-2">📋</span>
                            Bid & Trick Entry
                        </h2>

                        <!-- Round Selection -->
                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                Round: <span class="text-blue-600" x-text="currentRound"></span>
                            </label>
                            <input 
                                type="range" 
                                x-model.number="currentRound" 
                                :min="1" 
                                :max="totalRounds"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                @change="resetForm()"
                            >
                            <div class="flex justify-between text-xs text-gray-500 mt-1">
                                <span>Round 1</span>
                                <span x-text="`Round ${totalRounds}`"></span>
                            </div>
                        </div>

                        <!-- Player List -->
                        <form @submit.prevent="submitScores">
                            <div class="space-y-4 mb-6">
                                <template x-for="(player, index) in players" :key="index">
                                    <div class="border border-gray-200 rounded-lg p-4 hover:border-blue-300 transition">
                                        <div class="flex items-center justify-between mb-4">
                                            <div>
                                                <h3 class="font-semibold text-gray-800" x-text="player.name"></h3>
                                                <p class="text-sm text-gray-500">Player <span x-text="index + 1"></span></p>
                                            </div>
                                            <div class="badge badge-success" x-show="playerBids[index] !== null && playerTricks[index] !== null">
                                                <span>✓ Complete</span>
                                            </div>
                                        </div>

                                        <div class="grid grid-cols-2 gap-4">
                                            <!-- Bid Input -->
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                                    Tricks Bid
                                                </label>
                                                <input 
                                                    type="number" 
                                                    x-model.number="playerBids[index]"
                                                    min="0"
                                                    :max="maxTricks"
                                                    placeholder="0"
                                                    :class="['w-full px-3 py-2 border rounded-md input-field', playerBidErrors[index] ? 'error-input' : 'border-gray-300']"
                                                    @input="validatePlayerBid(index)"
                                                >
                                                <p class="text-xs text-red-600 mt-1" x-show="playerBidErrors[index]" x-text="playerBidErrors[index]"></p>
                                            </div>

                                            <!-- Tricks Taken Input -->
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                                    Tricks Taken
                                                </label>
                                                <input 
                                                    type="number" 
                                                    x-model.number="playerTricks[index]"
                                                    min="0"
                                                    :max="maxTricks"
                                                    placeholder="0"
                                                    :class="['w-full px-3 py-2 border rounded-md input-field', playerTrickErrors[index] ? 'error-input' : 'border-gray-300']"
                                                    @input="validatePlayerTricks(index)"
                                                >
                                                <p class="text-xs text-red-600 mt-1" x-show="playerTrickErrors[index]" x-text="playerTrickErrors[index]"></p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Global Validation Errors -->
                            <template x-if="globalErrors.length > 0">
                                <div class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
                                    <h4 class="font-semibold text-red-800 mb-2">Validation Issues:</h4>
                                    <ul class="space-y-1">
                                        <template x-for="error in globalErrors" :key="error">
                                            <li class="text-sm text-red-700 flex items-start">
                                                <span class="mr-2">•</span>
                                                <span x-text="error"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>

                            <!-- Submit Button -->
                            <div class="flex gap-2">
                                <button 
                                    type="submit"
                                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105"
                                >
                                    ✓ Calculate Scores
                                </button>
                                <button 
                                    type="button"
                                    @click="resetForm()"
                                    class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-lg transition duration-200"
                                >
                                    ↻ Reset
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Score Breakdown Section -->
                <div class="lg:col-span-1">
                    <!-- Summary Stats -->
                    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                            <span class="text-xl mr-2">📊</span>
                            Summary
                        </h3>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center p-3 bg-blue-50 rounded">
                                <span class="text-gray-700 font-medium">Total Players:</span>
                                <span class="text-lg font-bold text-blue-600" x-text="players.length"></span>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-purple-50 rounded">
                                <span class="text-gray-700 font-medium">Total Rounds:</span>
                                <span class="text-lg font-bold text-purple-600" x-text="totalRounds"></span>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-green-50 rounded">
                                <span class="text-gray-700 font-medium">Max Tricks/Round:</span>
                                <span class="text-lg font-bold text-green-600" x-text="maxTricks"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Score Breakdown (if available) -->
                    <template x-if="lastCalculatedScores.length > 0">
                        <div class="bg-white rounded-lg shadow-lg p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                <span class="text-xl mr-2">🧮</span>
                                Score Breakdown
                            </h3>
                            <div class="space-y-4">
                                <template x-for="(score, index) in lastCalculatedScores" :key="index">
                                    <div class="score-card bg-gray-50 rounded-lg p-4">
                                        <h4 class="font-semibold text-gray-800 mb-3" x-text="players[index]?.name || 'Player ' + (index + 1)"></h4>
                                        <div class="space-y-2 text-sm">
                                            <div class="flex justify-between">
                                                <span class="text-gray-600">Base Score:</span>
                                                <span class="font-semibold text-gray-800" x-text="score.baseScore"></span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-600">Bonus:</span>
                                                <span class="font-semibold" :class="score.bonus > 0 ? 'text-green-600' : 'text-gray-800'" x-text="(score.bonus >= 0 ? '+' : '') + score.bonus"></span>
                                            </div>
                                            <div class="border-t border-gray-200 pt-2 mt-2 flex justify-between">
                                                <span class="font-bold text-gray-800">Round Total:</span>
                                                <span class="text-lg font-bold text-blue-600" x-text="score.total"></span>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Score History Table -->
            <template x-if="scoreHistory.length > 0">
                <div class="mt-8 bg-white rounded-lg shadow-lg p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="text-2xl mr-2">📈</span>
                        Score History
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="border-b-2 border-gray-300">
                                    <th class="font-semibold text-gray-700 py-3 px-4">Round</th>
                                    <th class="font-semibold text-gray-700 py-3 px-4">Player</th>
                                    <th class="font-semibold text-gray-700 py-3 px-4 text-center">Bid</th>
                                    <th class="font-semibold text-gray-700 py-3 px-4 text-center">Tricks</th>
                                    <th class="font-semibold text-gray-700 py-3 px-4 text-right">Base Score</th>
                                    <th class="font-semibold text-gray-700 py-3 px-4 text-right">Bonus</th>
                                    <th class="font-semibold text-gray-700 py-3 px-4 text-right">Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(entry, index) in scoreHistory" :key="index">
                                    <tr class="table-row-hover border-b border-gray-200">
                                        <td class="py-3 px-4 font-medium text-gray-800" x-text="entry.round"></td>
                                        <td class="py-3 px-4 text-gray-800" x-text="entry.playerName"></td>
                                        <td class="py-3 px-4 text-center text-gray-700" x-text="entry.bid"></td>
                                        <td class="py-3 px-4 text-center text-gray-700" x-text="entry.tricks"></td>
                                        <td class="py-3 px-4 text-right text-gray-700" x-text="entry.baseScore"></td>
                                        <td class="py-3 px-4 text-right" :class="entry.bonus > 0 ? 'text-green-600 font-semibold' : 'text-gray-700'" x-text="(entry.bonus >= 0 ? '+' : '') + entry.bonus"></td>
                                        <td class="py-3 px-4 text-right font-bold text-blue-600" x-text="entry.total"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script src="js/scoring-ui.js"></script>
</body>
</html>

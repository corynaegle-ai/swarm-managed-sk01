<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/scoreboard.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Trick Entry Form Styles */
        #trick-entry-form {
            margin: 2rem auto;
            max-width: 600px;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        #trick-entry-form h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: #333;
        }

        #trick-inputs {
            display: grid;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .trick-input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .trick-input-group label {
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .trick-input-group input {
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
            font-family: inherit;
        }

        .trick-input-group input:focus {
            outline: none;
            border-color: #1976d2;
            background-color: #f5f5f5;
        }

        .trick-input-group input:hover {
            border-color: #bdbdbd;
        }

        #validation-errors {
            margin-top: 1rem;
        }

        #validation-errors div {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid #d32f2f;
        }

        #validation-errors h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        #validation-errors ul {
            margin: 0;
            padding-left: 1.5rem;
        }

        #validation-errors li {
            margin-bottom: 0.25rem;
            line-height: 1.4;
        }

        .form-footer {
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .remaining-tricks {
            font-size: 1.1rem;
            color: #333;
        }

        .remaining-tricks strong {
            font-weight: 600;
        }

        .remaining-tricks span {
            font-size: 1.3rem;
            color: #1976d2;
            font-weight: 600;
        }

        #trick-entry-form button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease, opacity 0.2s ease;
        }

        #trick-entry-form button:hover:not(:disabled) {
            background-color: #1565c0;
        }

        #trick-entry-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #1976d2;
        }

        @media (max-width: 600px) {
            #trick-entry-form {
                padding: 1.5rem;
                margin: 1rem;
            }

            .form-footer {
                flex-direction: column;
                align-items: stretch;
            }

            #trick-entry-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Welcome to Vanilla JS App</h1>
        <p>Application ready for development</p>
    </div>
    <div id="trick-entry-form" x-data="trickEntryForm()" x-show="shouldDisplayForm" style="display:none;">
        <h2>Enter Tricks for Round <span x-text="currentRound"></span></h2>
        <form @submit.prevent="submitTrickEntry()">
            <div id="trick-inputs">
                <template x-for="player in players" :key="player.id">
                    <div class="trick-input-group">
                        <label :for="'tricks-' + player.id" x-text="player.name"></label>
                        <input
                            :id="'tricks-' + player.id"
                            type="number"
                            min="0"
                            x-model.number="player.tricks"
                            placeholder="Enter tricks taken"
                            @input="handlePlayerInput(player.id)"
                        />
                    </div>
                </template>
            </div>
            
            <div id="validation-errors" x-show="validationErrors.length > 0" style="display:none;">
                <div>
                    <h3>Validation Errors:</h3>
                    <ul>
                        <template x-for="error in validationErrors" :key="error">
                            <li x-text="error"></li>
                        </template>
                    </ul>
                </div>
            </div>
            
            <div class="form-footer">
                <div class="remaining-tricks">
                    <strong>Remaining Tricks:</strong> <span x-text="remainingTricks"></span>
                </div>
                <button 
                    type="submit" 
                    x-bind:disabled="!isFormValid"
                >
                    Submit Tricks
                </button>
            </div>
        </form>
    </div>
    <script src="js/scoreboardUI.js"></script>
    <script src="js/trick-entry.js"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/scoreboard.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <div id="app" x-data="appState()">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
            <h1>Welcome to Vanilla JS App</h1>
            <button 
                @click="scoreboardVisible = !scoreboardVisible" 
                class="pirate-btn"
                style="padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; background: linear-gradient(135deg, #8B4513, #D2691E); color: white; border: 2px solid #654321; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); transition: all 0.3s ease;"
                @mouseover="$el.style.background='linear-gradient(135deg, #A0522D, #FF8C00)'"
                @mouseout="$el.style.background='linear-gradient(135deg, #8B4513, #D2691E)'"
            >
                ☠️ <span x-text="scoreboardVisible ? 'Hide' : 'Show'"></span> Scoreboard
            </button>
        </div>
        <p>Application ready for development</p>
        
        <!-- Scoreboard Panel -->
        <div x-show="scoreboardVisible" style="margin-top: 2rem;" class="scoreboard-container">
            <div class="treasure-chest-header">
                <h2 style="margin: 0; display: flex; align-items: center; gap: 0.75rem;">
                    <span class="treasure-icon">🗂️</span>
                    Player Standings
                    <span class="treasure-icon">🗂️</span>
                </h2>
            </div>
            
            <div class="scoreboard-wrapper">
                <table class="scoreboard-table" role="grid">
                    <thead>
                        <tr class="scoreboard-header-row">
                            <th style="text-align: left; padding: 1rem; border-bottom: 3px solid #DAA520;">Player Name</th>
                            <template x-for="(round, index) in rounds" :key="index">
                                <th style="text-align: center; padding: 1rem; border-bottom: 3px solid #DAA520; min-width: 80px;" :title="'Round ' + (index + 1)">R<span x-text="index + 1"></span></th>
                            </template>
                            <th style="text-align: center; padding: 1rem; border-bottom: 3px solid #DAA520; font-weight: bold; background-color: #2c2410; min-width: 100px;">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(player, playerIndex) in players" :key="playerIndex">
                            <tr class="scoreboard-row" :style="playerIndex % 2 === 0 ? 'background-color: rgba(139, 69, 19, 0.1);' : ''">
                                <td style="padding: 1rem; text-align: left; font-weight: bold; color: #333;">
                                    <span class="player-rank" x-text="playerIndex + 1"></span>
                                    <span x-text="player.name"></span>
                                </td>
                                <template x-for="(round, roundIndex) in rounds" :key="roundIndex">
                                    <td style="text-align: center; padding: 1rem; color: #333;" :class="{'round-zero': player.roundScores[roundIndex] === 0}">
                                        <span x-text="player.roundScores[roundIndex]"></span>
                                    </td>
                                </template>
                                <td style="text-align: center; padding: 1rem; font-weight: bold; font-size: 1.1em; color: #DAA520; background-color: rgba(218, 165, 32, 0.1);">
                                    <span x-text="player.totalScore"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            
            <div class="scoreboard-footer">
                <p style="margin: 0; font-size: 0.9em; color: #666;">
                    <span style="display: inline-block; margin-right: 1.5rem;">📊 Total Players: <strong x-text="players.length"></strong></span>
                    <span style="display: inline-block;">🎯 Total Rounds: <strong x-text="rounds.length"></strong></span>
                </p>
            </div>
        </div>
    </div>
    
    <div id="trick-entry-form" x-data="trickEntryForm()" style="display:none;">
        <h2>Enter Tricks for Round <span x-text="currentRound"></span></h2>
        <form @submit.prevent="submitTrickEntry">
            <div id="trick-inputs">
                <!-- Trick input fields will be dynamically generated here -->
            </div>
            
            <div id="validation-errors" x-show="validationErrors.length > 0" style="display:none; margin-top: 1rem;">
                <div style="color: #d32f2f; background-color: #ffebee; padding: 1rem; border-radius: 4px; border-left: 4px solid #d32f2f;">
                    <h3 style="margin-top: 0; margin-bottom: 0.5rem;">Validation Errors:</h3>
                    <ul style="margin: 0; padding-left: 1.5rem;">
                        <template x-for="error in validationErrors" :key="error">
                            <li x-text="error" style="margin-bottom: 0.25rem;"></li>
                        </template>
                    </ul>
                </div>
            </div>
            
            <div style="margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
                <div style="font-size: 1.1rem;">
                    <strong>Remaining Tricks:</strong> <span x-text="remainingTricks" style="font-size: 1.2rem; color: #1976d2;"></span>
                </div>
                <button 
                    type="submit" 
                    x-bind:disabled="!isFormValid" 
                    style="padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer;"
                    :style="!isFormValid && 'opacity: 0.5; cursor: not-allowed;'"
                >
                    Submit Tricks
                </button>
            </div>
        </form>
    </div>
    
    <script>
        function appState() {
            return {
                scoreboardVisible: false,
                rounds: [1, 2, 3, 4, 5],
                players: [
                    {
                        name: 'Captain Jack',
                        roundScores: [8, 7, 9, 6, 8],
                        totalScore: 38
                    },
                    {
                        name: 'Blackbeard',
                        roundScores: [7, 8, 7, 8, 9],
                        totalScore: 39
                    },
                    {
                        name: 'Davy Jones',
                        roundScores: [6, 6, 8, 7, 7],
                        totalScore: 34
                    },
                    {
                        name: 'Anne Bonny',
                        roundScores: [9, 8, 8, 9, 8],
                        totalScore: 42
                    },
                    {
                        name: 'Long John',
                        roundScores: [5, 7, 6, 8, 7],
                        totalScore: 33
                    }
                ]
            }
        }
    </script>
    
    <script src="js/scoreboardUI.js"></script>
    <script src="js/trick-entry.js"></script>
    <script src="app.js"></script>
</body>
</html>

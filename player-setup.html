<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Setup - Vanilla JS App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/player-setup.css">
</head>
<body>
    <div id="app">
        <div class="setup-container">
            <h1>Player Setup</h1>
            <p class="player-count">Players: <span id="player-count">0</span>/8</p>
            
            <form id="player-form" class="player-form">
                <div class="form-group">
                    <label for="player-name">Player Name:</label>
                    <input 
                        type="text" 
                        id="player-name" 
                        name="player-name" 
                        placeholder="Enter player name"
                        required
                        maxlength="50"
                    >
                    <span id="error-message" class="error-message"></span>
                </div>
                
                <button type="button" id="add-player-btn" class="btn btn-primary">Add Player</button>
            </form>
            
            <div class="players-section">
                <h2>Players</h2>
                <ol id="players-list" class="players-list">
                    <!-- Players will be added here dynamically -->
                </ol>
            </div>
            
            <button type="button" id="start-game-btn" class="btn btn-success" disabled>Start Game</button>
        </div>
    </div>
    
    <script src="js/player-setup.js"></script>
</body>
</html>
